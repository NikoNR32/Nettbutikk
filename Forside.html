<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NikoSport</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">
            <h1>NikoSport</h1>
        </div>

        <form class="search-bar">
            <input type="text" name="query" placeholder="Søk etter fotballsko eller klubbservice">
            <button type="submit">Søk</button>
        </form>

        <div class="header-icons">
            <button>Logg inn</button>
            <button>Handlekurv</button>
        </div>
    </header>

    <main>
        <aside class="filters">
            <h2>Sorter etter:</h2>

            <div class="filter-group"><p>Merke</p></div>
            <div class="filter-group"><p>Passer til</p></div>
            <div class="filter-group"><p>Størrelse</p></div>
            <div class="filter-group"><p>Farge</p></div>
            <div class="filter-group"><p>Pris</p></div>
        </aside>

        <section class="products">
            <article class="product-card">
                <img src="" alt="Fotballsko">
                <h3>Produktnavn</h3>
                <p>999 kr</p>
            </article>

            <article class="product-card">
                <img src="" alt="Fotballsko">
                <h3>Produktnavn</h3>
                <p>1099 kr</p>
            </article>

            <article class="product-card">
                <img src="" alt="Fotballsko">
                <h3>Produktnavn</h3>
                <p>899 kr</p>
            </article>
        </section>
    </main>

</body>
</html>
